<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightCompass — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#04050a;color:#e8edf5;font-family:'DM Mono',monospace;
    overflow:hidden;
  }
  .abg{position:fixed;inset:0;pointer-events:none;}
  .abg::before{content:'';position:absolute;top:-40%;left:-20%;width:80%;height:70%;
    background:radial-gradient(ellipse,rgba(0,255,163,.06) 0%,transparent 70%);
    animation:d1 18s ease-in-out infinite alternate;}
  .abg::after{content:'';position:absolute;top:-30%;right:-10%;width:70%;height:60%;
    background:radial-gradient(ellipse,rgba(0,212,255,.04) 0%,transparent 70%);
    animation:d2 22s ease-in-out infinite alternate;}
  @keyframes d1{from{transform:translate(0,0)}to{transform:translate(8%,5%)}}
  @keyframes d2{from{transform:translate(0,0)}to{transform:translate(-6%,8%)}}

  .card{
    position:relative;z-index:1;text-align:center;padding:60px 40px;
    max-width:480px;
  }
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;
    letter-spacing:-.5px;margin-bottom:8px;}
  .logo span{color:#00ffa3;}
  .dot{display:inline-block;width:8px;height:8px;background:#00ffa3;
    border-radius:50%;box-shadow:0 0 8px #00ffa3;margin-bottom:32px;
    animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
  h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;
    margin-bottom:16px;color:#e8edf5;}
  p{font-size:12px;color:#6b7a99;line-height:1.8;letter-spacing:.3px;margin-bottom:32px;}
  .badge{display:inline-block;padding:6px 14px;border:1px solid rgba(0,255,163,.22);
    border-radius:6px;font-size:10px;color:#00ffa3;background:rgba(0,255,163,.06);
    letter-spacing:.8px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="abg"></div>
<div class="card">
  <div class="logo">Night<span>Compass</span></div>
  <div style="margin-bottom:32px;"><span class="dot"></span></div>
  <h1>We're preparing something stellar.</h1>
  <p>NightCompass is your guide to the night sky — real-time Aurora tracking, space weather data, and hyperlocal forecasts for chasers and photographers.</p>
  <div class="badge">🚀 Launching Soon</div>
</div>
</body>
</html>
