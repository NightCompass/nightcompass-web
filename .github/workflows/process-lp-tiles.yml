name: Process Light Pollution Tiles (VNP46A4)

# ── Manual trigger only ───────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to process (e.g. 2023)'
        required: true
        default: '2023'
        type: string
      test_mode:
        description: 'Test mode: process v05 only (40N-50N, 36 tiles). Run this first to verify storage.'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  # ── Test mode: single job, v05 only ──────────────────────────────────────
  process-test:
    name: "Test — v05 only (40N-50N)"
    runs-on: ubuntu-latest
    if: ${{ inputs.test_mode == 'true' }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip libhdf5-dev wget
          pip3 install h5py numpy Pillow --break-system-packages
          echo "✓ Dependencies installed"

      - name: Process v05
        env:
          NASA_TOKEN: ${{ secrets.NASA_BEARER_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          YEAR: ${{ inputs.year }}
          V_START: '5'
          V_END: '5'
        run: |
          python3 - << 'PY'
          import os, math, io, json, hmac, hashlib, datetime, urllib.request
          import h5py, numpy as np
          from PIL import Image
          from pathlib import Path

          NASA_TOKEN = os.environ['NASA_TOKEN']
          YEAR       = os.environ['YEAR']
          V_START    = int(os.environ['V_START'])
          V_END      = int(os.environ['V_END'])
          R2_KEY     = os.environ['R2_ACCESS_KEY_ID']
          R2_SECRET  = os.environ['R2_SECRET_ACCESS_KEY']
          R2_BUCKET  = os.environ['R2_BUCKET']
          R2_ACCOUNT = os.environ['R2_ACCOUNT_ID']

          LAADS_BASE = 'https://ladsweb.modaps.eosdis.nasa.gov'
          COLLECTION = '5200'
          PRODUCT    = 'VNP46A4'
          DAY        = '001'
          ZOOM_MIN, ZOOM_MAX = 0, 8
          TILE_SIZE  = 256

          print(f'=== TEST MODE: v05 only (lat 40N-50N, 36 tiles) ===')

          RAMP = [
              (0.00,  (0,   0,   0,   0  )),
              (0.01,  (0,   20,  60,  30 )),
              (0.05,  (0,   40,  80,  60 )),
              (0.15,  (0,   60,  100, 90 )),
              (0.50,  (20,  80,  60,  120)),
              (1.50,  (60,  100, 20,  150)),
              (5.00,  (120, 100, 0,   180)),
              (15.0,  (180, 80,  0,   200)),
              (50.0,  (220, 40,  0,   220)),
              (200.0, (255, 0,   0,   240)),
          ]

          def apply_ramp(radiance):
              h, w = radiance.shape
              rgba = np.zeros((h, w, 4), dtype=np.uint8)
              for i in range(len(RAMP) - 1):
                  lo_v, lo_c = RAMP[i]
                  hi_v, hi_c = RAMP[i+1]
                  mask = (radiance > lo_v) & (radiance <= hi_v)
                  if not mask.any(): continue
                  t = np.where(mask, (radiance - lo_v) / (hi_v - lo_v), 0)
                  for ch in range(4):
                      rgba[:,:,ch] = np.where(mask,
                          np.clip(lo_c[ch] + t*(hi_c[ch]-lo_c[ch]),0,255).astype(np.uint8),
                          rgba[:,:,ch])
              mask_max = radiance > RAMP[-1][0]
              if mask_max.any():
                  for ch in range(4):
                      rgba[:,:,ch] = np.where(mask_max, RAMP[-1][1][ch], rgba[:,:,ch])
              return rgba

          def r2_upload(key, data, ct='image/png'):
              host = f'{R2_ACCOUNT}.r2.cloudflarestorage.com'
              now  = datetime.datetime.utcnow()
              ds   = now.strftime('%Y%m%d'); ts = now.strftime('%Y%m%dT%H%M%SZ')
              ph   = hashlib.sha256(data).hexdigest()
              hdrs = {'content-type':ct,'host':host,'x-amz-content-sha256':ph,'x-amz-date':ts}
              ch   = ''.join(f'{k}:{v}\n' for k,v in sorted(hdrs.items()))
              sh   = ';'.join(sorted(hdrs.keys()))
              cr   = '\n'.join(['PUT',f'/{R2_BUCKET}/{key}','',ch,sh,ph])
              cs   = f'{ds}/auto/s3/aws4_request'
              sts  = '\n'.join(['AWS4-HMAC-SHA256',ts,cs,hashlib.sha256(cr.encode()).hexdigest()])
              def h256(k,m): return hmac.new(k,m.encode(),hashlib.sha256).digest()
              sk   = h256(h256(h256(h256(f'AWS4{R2_SECRET}'.encode(),ds),'auto'),'s3'),'aws4_request')
              sig  = hmac.new(sk,sts.encode(),hashlib.sha256).hexdigest()
              auth = f'AWS4-HMAC-SHA256 Credential={R2_KEY}/{cs},SignedHeaders={sh},Signature={sig}'
              req  = urllib.request.Request(f'https://{host}/{R2_BUCKET}/{key}',data=data,method='PUT')
              for k,v in [('Authorization',auth),('Content-Type',ct),
                           ('x-amz-content-sha256',ph),('x-amz-date',ts)]: req.add_header(k,v)
              with urllib.request.urlopen(req) as r: return r.status

          def deg2num(lat, lon, z):
              lr = math.radians(lat); n = 2**z
              return (int((lon+180)/360*n),
                      max(0,min(n-1,int((1-math.log(math.tan(lr)+1/math.cos(lr))/math.pi)/2*n))))

          def tile_bbox(x, y, z):
              n = 2**z
              w=x/n*360-180; e=(x+1)/n*360-180
              nn=math.degrees(math.atan(math.sinh(math.pi*(1-2*y/n))))
              s=math.degrees(math.atan(math.sinh(math.pi*(1-2*(y+1)/n))))
              return w, nn, e, s

          tmp_dir = Path('/tmp/vnp46a4'); tmp_dir.mkdir(exist_ok=True)
          processed=0; failed=0; total_bytes=0; total_tiles=0

          for v in range(V_START, V_END+1):
              for h in range(1):  # DIAGNOSTIC: only h00 to keep logs short
                  tile_id = f'h{h:02d}v{v:02d}'
                  west=h*10-180; east=west+10; north=90-v*10; south=north-10

                  # LAADS directory listing: append .json to the day URL
                  # Returns {"content": [{"name": "VNP46A4.A2023001.h00v05...", "size": 12345}, ...]}
                  list_url = (f'{LAADS_BASE}/archive/allData/{COLLECTION}/'
                              f'{PRODUCT}/{YEAR}/{DAY}.json')
                  req = urllib.request.Request(list_url)
                  req.add_header('Authorization', f'Bearer {NASA_TOKEN}')
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          resp = json.loads(r.read())
                      files = resp.get('content', resp) if isinstance(resp, dict) else resp
                      matches = [f['name'] for f in files if tile_id in f.get('name','') and f.get('name','').endswith('.h5')]
                      if not matches:
                          print(f'  skip {tile_id}: not found')
                          continue
                      filename = matches[0]
                  except Exception as e:
                      print(f'  ✗ {tile_id} listing: {e}')
                      failed+=1; continue

                  h5_path = tmp_dir/filename
                  dl_url  = (f'{LAADS_BASE}/archive/allData/{COLLECTION}/'
                             f'{PRODUCT}/{YEAR}/{DAY}/{filename}')
                  # Use wget with verbose output for diagnosis
                  import subprocess
                  try:
                      result = subprocess.run([
                          'wget', '-v', '-S',
                          '--save-cookies', '/tmp/laads_cookies.txt',
                          '--keep-session-cookies',
                          '--header', f'Authorization: Bearer {NASA_TOKEN}',
                          '-O', str(h5_path), dl_url
                      ], capture_output=True, timeout=300, text=True)
                      # Print wget output for diagnosis
                      if result.stdout: print(f'    wget stdout: {result.stdout[:500]}')
                      if result.stderr: print(f'    wget stderr: {result.stderr[:500]}')
                      sz = h5_path.stat().st_size if h5_path.exists() else 0
                      if sz < 1024 * 100:
                          try:
                              with open(h5_path,'rb') as dbg: snippet = dbg.read(300)
                              print(f'  ✗ {tile_id}: got {sz} bytes — {snippet}')
                          except: pass
                          h5_path.unlink(missing_ok=True); failed+=1; continue
                      print(f'  ↓ {tile_id}: {sz/1024/1024:.1f} MB')
                  except Exception as e:
                      print(f'  ✗ {tile_id} download exception: {e}')
                      h5_path.unlink(missing_ok=True); failed+=1; continue

                  try:
                      with h5py.File(h5_path,'r') as hf:
                          grp  = hf['HDFEOS/GRIDS/VNP_Grid_DNB/Data Fields']
                          band = ('NearNadir_Composite_Snow_Free'
                                  if 'NearNadir_Composite_Snow_Free' in grp
                                  else 'AllAngle_Composite_Snow_Free')
                          raw  = grp[band][:]
                          rad  = np.where(raw==65535, np.nan, raw.astype(float)*0.1)
                  except Exception as e:
                      print(f'  ✗ {tile_id} HDF5: {e}')
                      h5_path.unlink(missing_ok=True); failed+=1; continue

                  rgba    = apply_ramp(rad)
                  src_img = Image.fromarray(rgba,'RGBA')
                  rows,cols = rad.shape

                  uploaded=0; tile_bytes=0
                  for zoom in range(ZOOM_MIN, ZOOM_MAX+1):
                      x_min,y_min = deg2num(north,west,zoom)
                      x_max,y_max = deg2num(south,east,zoom)
                      n=2**zoom
                      x_min=max(0,x_min); x_max=min(n-1,x_max)
                      y_min=max(0,y_min); y_max=min(n-1,y_max)
                      for tx in range(x_min,x_max+1):
                          for ty in range(y_min,y_max+1):
                              tb_w,tb_n,tb_e,tb_s = tile_bbox(tx,ty,zoom)
                              iw=east-west; ih=north-south
                              cx0=int((tb_w-west)/iw*cols); cx1=int((tb_e-west)/iw*cols)
                              cy0=int((north-tb_n)/ih*rows); cy1=int((north-tb_s)/ih*rows)
                              cx0=max(0,min(cols,cx0)); cx1=max(0,min(cols,cx1))
                              cy0=max(0,min(rows,cy0)); cy1=max(0,min(rows,cy1))
                              if cx1<=cx0 or cy1<=cy0: continue
                              tile_img = src_img.crop((cx0,cy0,cx1,cy1)).resize(
                                  (TILE_SIZE,TILE_SIZE),Image.LANCZOS)
                              arr = np.array(tile_img)
                              if arr[:,:,3].max()==0: continue
                              buf=io.BytesIO(); tile_img.save(buf,format='PNG',optimize=True)
                              png=buf.getvalue()
                              try:
                                  r2_upload(f'lp/{YEAR}/{zoom}/{tx}/{ty}.png', png)
                                  uploaded+=1; tile_bytes+=len(png)
                              except Exception as e:
                                  print(f'    ✗ z{zoom}/{tx}/{ty}: {e}')

                  total_bytes+=tile_bytes; total_tiles+=uploaded
                  print(f'  ✓ {tile_id}: {uploaded} tiles, {tile_bytes/1024:.0f} KB')
                  processed+=1
                  h5_path.unlink(missing_ok=True)

          print(f'\n{"="*60}')
          print(f'  Processed: {processed} VIIRS tiles, {failed} failed')
          print(f'  XYZ tiles uploaded: {total_tiles:,}')
          print(f'  Total uploaded: {total_bytes/1024/1024:.1f} MB')
          est = total_bytes*18/1024/1024
          print(f'\n  EXTRAPOLATED GLOBAL ESTIMATE: ~{est:.0f} MB')
          ok = "✓ within R2 free tier (10,240 MB)" if est < 8192 else "⚠ check before full run"
          print(f'  {ok}')
          PY

  # ── Full mode: 6 parallel jobs ───────────────────────────────────────────
  process-full:
    name: "Full — v${{ matrix.v_start }}-v${{ matrix.v_end }}"
    runs-on: ubuntu-latest
    if: ${{ inputs.test_mode == 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { v_start: 0,  v_end: 2  }
          - { v_start: 3,  v_end: 5  }
          - { v_start: 6,  v_end: 8  }
          - { v_start: 9,  v_end: 11 }
          - { v_start: 12, v_end: 14 }
          - { v_start: 15, v_end: 17 }
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip libhdf5-dev wget
          pip3 install h5py numpy Pillow --break-system-packages
          echo "✓ Dependencies installed"

      - name: Process v${{ matrix.v_start }}-v${{ matrix.v_end }}
        env:
          NASA_TOKEN: ${{ secrets.NASA_BEARER_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          YEAR: ${{ inputs.year }}
          V_START: ${{ matrix.v_start }}
          V_END: ${{ matrix.v_end }}
        run: |
          python3 - << 'PY'
          import os, math, io, json, hmac, hashlib, datetime, urllib.request
          import h5py, numpy as np
          from PIL import Image
          from pathlib import Path

          NASA_TOKEN = os.environ['NASA_TOKEN']
          YEAR       = os.environ['YEAR']
          V_START    = int(os.environ['V_START'])
          V_END      = int(os.environ['V_END'])
          R2_KEY     = os.environ['R2_ACCESS_KEY_ID']
          R2_SECRET  = os.environ['R2_SECRET_ACCESS_KEY']
          R2_BUCKET  = os.environ['R2_BUCKET']
          R2_ACCOUNT = os.environ['R2_ACCOUNT_ID']

          LAADS_BASE = 'https://ladsweb.modaps.eosdis.nasa.gov'
          COLLECTION = '5200'
          PRODUCT    = 'VNP46A4'
          DAY        = '001'
          ZOOM_MIN, ZOOM_MAX = 0, 8
          TILE_SIZE  = 256

          print(f'=== FULL MODE: v{V_START:02d}-v{V_END:02d} ===')

          RAMP = [
              (0.00,  (0,   0,   0,   0  )),
              (0.01,  (0,   20,  60,  30 )),
              (0.05,  (0,   40,  80,  60 )),
              (0.15,  (0,   60,  100, 90 )),
              (0.50,  (20,  80,  60,  120)),
              (1.50,  (60,  100, 20,  150)),
              (5.00,  (120, 100, 0,   180)),
              (15.0,  (180, 80,  0,   200)),
              (50.0,  (220, 40,  0,   220)),
              (200.0, (255, 0,   0,   240)),
          ]

          def apply_ramp(radiance):
              h, w = radiance.shape
              rgba = np.zeros((h, w, 4), dtype=np.uint8)
              for i in range(len(RAMP) - 1):
                  lo_v, lo_c = RAMP[i]
                  hi_v, hi_c = RAMP[i+1]
                  mask = (radiance > lo_v) & (radiance <= hi_v)
                  if not mask.any(): continue
                  t = np.where(mask, (radiance - lo_v) / (hi_v - lo_v), 0)
                  for ch in range(4):
                      rgba[:,:,ch] = np.where(mask,
                          np.clip(lo_c[ch] + t*(hi_c[ch]-lo_c[ch]),0,255).astype(np.uint8),
                          rgba[:,:,ch])
              mask_max = radiance > RAMP[-1][0]
              if mask_max.any():
                  for ch in range(4):
                      rgba[:,:,ch] = np.where(mask_max, RAMP[-1][1][ch], rgba[:,:,ch])
              return rgba

          def r2_upload(key, data, ct='image/png'):
              host = f'{R2_ACCOUNT}.r2.cloudflarestorage.com'
              now  = datetime.datetime.utcnow()
              ds   = now.strftime('%Y%m%d'); ts = now.strftime('%Y%m%dT%H%M%SZ')
              ph   = hashlib.sha256(data).hexdigest()
              hdrs = {'content-type':ct,'host':host,'x-amz-content-sha256':ph,'x-amz-date':ts}
              ch   = ''.join(f'{k}:{v}\n' for k,v in sorted(hdrs.items()))
              sh   = ';'.join(sorted(hdrs.keys()))
              cr   = '\n'.join(['PUT',f'/{R2_BUCKET}/{key}','',ch,sh,ph])
              cs   = f'{ds}/auto/s3/aws4_request'
              sts  = '\n'.join(['AWS4-HMAC-SHA256',ts,cs,hashlib.sha256(cr.encode()).hexdigest()])
              def h256(k,m): return hmac.new(k,m.encode(),hashlib.sha256).digest()
              sk   = h256(h256(h256(h256(f'AWS4{R2_SECRET}'.encode(),ds),'auto'),'s3'),'aws4_request')
              sig  = hmac.new(sk,sts.encode(),hashlib.sha256).hexdigest()
              auth = f'AWS4-HMAC-SHA256 Credential={R2_KEY}/{cs},SignedHeaders={sh},Signature={sig}'
              req  = urllib.request.Request(f'https://{host}/{R2_BUCKET}/{key}',data=data,method='PUT')
              for k,v in [('Authorization',auth),('Content-Type',ct),
                           ('x-amz-content-sha256',ph),('x-amz-date',ts)]: req.add_header(k,v)
              with urllib.request.urlopen(req) as r: return r.status

          def deg2num(lat, lon, z):
              lr = math.radians(lat); n = 2**z
              return (int((lon+180)/360*n),
                      max(0,min(n-1,int((1-math.log(math.tan(lr)+1/math.cos(lr))/math.pi)/2*n))))

          def tile_bbox(x, y, z):
              n = 2**z
              w=x/n*360-180; e=(x+1)/n*360-180
              nn=math.degrees(math.atan(math.sinh(math.pi*(1-2*y/n))))
              s=math.degrees(math.atan(math.sinh(math.pi*(1-2*(y+1)/n))))
              return w, nn, e, s

          tmp_dir = Path('/tmp/vnp46a4'); tmp_dir.mkdir(exist_ok=True)
          processed=0; failed=0; total_bytes=0; total_tiles=0

          for v in range(V_START, V_END+1):
              for h in range(1):  # DIAGNOSTIC: only h00 to keep logs short
                  tile_id = f'h{h:02d}v{v:02d}'
                  west=h*10-180; east=west+10; north=90-v*10; south=north-10

                  # LAADS directory listing: append .json to the day URL
                  # Returns {"content": [{"name": "VNP46A4.A2023001.h00v05...", "size": 12345}, ...]}
                  list_url = (f'{LAADS_BASE}/archive/allData/{COLLECTION}/'
                              f'{PRODUCT}/{YEAR}/{DAY}.json')
                  req = urllib.request.Request(list_url)
                  req.add_header('Authorization', f'Bearer {NASA_TOKEN}')
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          resp = json.loads(r.read())
                      files = resp.get('content', resp) if isinstance(resp, dict) else resp
                      matches = [f['name'] for f in files if tile_id in f.get('name','') and f.get('name','').endswith('.h5')]
                      if not matches:
                          print(f'  skip {tile_id}: not found')
                          continue
                      filename = matches[0]
                  except Exception as e:
                      print(f'  ✗ {tile_id} listing: {e}')
                      failed+=1; continue

                  h5_path = tmp_dir/filename
                  dl_url  = (f'{LAADS_BASE}/archive/allData/{COLLECTION}/'
                             f'{PRODUCT}/{YEAR}/{DAY}/{filename}')
                  # Use wget with verbose output for diagnosis
                  import subprocess
                  try:
                      result = subprocess.run([
                          'wget', '-v', '-S',
                          '--save-cookies', '/tmp/laads_cookies.txt',
                          '--keep-session-cookies',
                          '--header', f'Authorization: Bearer {NASA_TOKEN}',
                          '-O', str(h5_path), dl_url
                      ], capture_output=True, timeout=300, text=True)
                      # Print wget output for diagnosis
                      if result.stdout: print(f'    wget stdout: {result.stdout[:500]}')
                      if result.stderr: print(f'    wget stderr: {result.stderr[:500]}')
                      sz = h5_path.stat().st_size if h5_path.exists() else 0
                      if sz < 1024 * 100:
                          try:
                              with open(h5_path,'rb') as dbg: snippet = dbg.read(300)
                              print(f'  ✗ {tile_id}: got {sz} bytes — {snippet}')
                          except: pass
                          h5_path.unlink(missing_ok=True); failed+=1; continue
                      print(f'  ↓ {tile_id}: {sz/1024/1024:.1f} MB')
                  except Exception as e:
                      print(f'  ✗ {tile_id} download exception: {e}')
                      h5_path.unlink(missing_ok=True); failed+=1; continue

                  try:
                      with h5py.File(h5_path,'r') as hf:
                          grp  = hf['HDFEOS/GRIDS/VNP_Grid_DNB/Data Fields']
                          band = ('NearNadir_Composite_Snow_Free'
                                  if 'NearNadir_Composite_Snow_Free' in grp
                                  else 'AllAngle_Composite_Snow_Free')
                          raw  = grp[band][:]
                          rad  = np.where(raw==65535, np.nan, raw.astype(float)*0.1)
                  except Exception as e:
                      print(f'  ✗ {tile_id} HDF5: {e}')
                      h5_path.unlink(missing_ok=True); failed+=1; continue

                  rgba    = apply_ramp(rad)
                  src_img = Image.fromarray(rgba,'RGBA')
                  rows,cols = rad.shape

                  uploaded=0; tile_bytes=0
                  for zoom in range(ZOOM_MIN, ZOOM_MAX+1):
                      x_min,y_min = deg2num(north,west,zoom)
                      x_max,y_max = deg2num(south,east,zoom)
                      n=2**zoom
                      x_min=max(0,x_min); x_max=min(n-1,x_max)
                      y_min=max(0,y_min); y_max=min(n-1,y_max)
                      for tx in range(x_min,x_max+1):
                          for ty in range(y_min,y_max+1):
                              tb_w,tb_n,tb_e,tb_s = tile_bbox(tx,ty,zoom)
                              iw=east-west; ih=north-south
                              cx0=int((tb_w-west)/iw*cols); cx1=int((tb_e-west)/iw*cols)
                              cy0=int((north-tb_n)/ih*rows); cy1=int((north-tb_s)/ih*rows)
                              cx0=max(0,min(cols,cx0)); cx1=max(0,min(cols,cx1))
                              cy0=max(0,min(rows,cy0)); cy1=max(0,min(rows,cy1))
                              if cx1<=cx0 or cy1<=cy0: continue
                              tile_img = src_img.crop((cx0,cy0,cx1,cy1)).resize(
                                  (TILE_SIZE,TILE_SIZE),Image.LANCZOS)
                              arr = np.array(tile_img)
                              if arr[:,:,3].max()==0: continue
                              buf=io.BytesIO(); tile_img.save(buf,format='PNG',optimize=True)
                              png=buf.getvalue()
                              try:
                                  r2_upload(f'lp/{YEAR}/{zoom}/{tx}/{ty}.png', png)
                                  uploaded+=1; tile_bytes+=len(png)
                              except Exception as e:
                                  print(f'    ✗ z{zoom}/{tx}/{ty}: {e}')

                  total_bytes+=tile_bytes; total_tiles+=uploaded
                  print(f'  ✓ {tile_id}: {uploaded} tiles, {tile_bytes/1024:.0f} KB')
                  processed+=1
                  h5_path.unlink(missing_ok=True)

          print(f'\n{"="*60}')
          print(f'  v{V_START:02d}-v{V_END:02d}: {processed} VIIRS tiles, {failed} failed')
          print(f'  XYZ tiles: {total_tiles:,} — {total_bytes/1024/1024:.1f} MB uploaded')
          PY

      - name: Upload metadata
        if: ${{ matrix.v_start == 0 }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          YEAR: ${{ inputs.year }}
        run: |
          python3 - << 'PY'
          import os, json, datetime, urllib.request, hmac, hashlib

          R2_KEY     = os.environ['R2_ACCESS_KEY_ID']
          R2_SECRET  = os.environ['R2_SECRET_ACCESS_KEY']
          R2_BUCKET  = os.environ['R2_BUCKET']
          R2_ACCOUNT = os.environ['R2_ACCOUNT_ID']
          YEAR       = os.environ['YEAR']

          meta = {
              "source": "NASA VNP46A4 Black Marble",
              "year": YEAR,
              "collection": "5200",
              "band": "NearNadir_Composite_Snow_Free",
              "zoom_min": 0, "zoom_max": 8, "tile_size": 256,
              "processed_utc": datetime.datetime.utcnow().isoformat(),
              "tile_url_pattern": f"lp/{YEAR}/{{z}}/{{x}}/{{y}}.png",
              "attribution": "NASA VNP46A4 Black Marble (LAADS DAAC)"
          }
          data = json.dumps(meta, indent=2).encode()

          def r2_upload(key, data, ct='application/json'):
              host = f'{R2_ACCOUNT}.r2.cloudflarestorage.com'
              now  = datetime.datetime.utcnow()
              ds   = now.strftime('%Y%m%d'); ts = now.strftime('%Y%m%dT%H%M%SZ')
              ph   = hashlib.sha256(data).hexdigest()
              hdrs = {'content-type':ct,'host':host,'x-amz-content-sha256':ph,'x-amz-date':ts}
              ch   = ''.join(f'{k}:{v}\n' for k,v in sorted(hdrs.items()))
              sh   = ';'.join(sorted(hdrs.keys()))
              cr   = '\n'.join(['PUT',f'/{R2_BUCKET}/{key}','',ch,sh,ph])
              cs   = f'{ds}/auto/s3/aws4_request'
              sts  = '\n'.join(['AWS4-HMAC-SHA256',ts,cs,hashlib.sha256(cr.encode()).hexdigest()])
              def h256(k,m): return hmac.new(k,m.encode(),hashlib.sha256).digest()
              sk   = h256(h256(h256(h256(f'AWS4{R2_SECRET}'.encode(),ds),'auto'),'s3'),'aws4_request')
              sig  = hmac.new(sk,sts.encode(),hashlib.sha256).hexdigest()
              auth = f'AWS4-HMAC-SHA256 Credential={R2_KEY}/{cs},SignedHeaders={sh},Signature={sig}'
              req  = urllib.request.Request(f'https://{host}/{R2_BUCKET}/{key}',data=data,method='PUT')
              for k,v in [('Authorization',auth),('Content-Type',ct),
                           ('x-amz-content-sha256',ph),('x-amz-date',ts)]: req.add_header(k,v)
              with urllib.request.urlopen(req) as r: return r.status

          r2_upload(f'lp/{YEAR}/meta.json', data)
          print(f'✓ meta.json uploaded for {YEAR}')
          PY
