name: Keep Workflows Active

on:
  schedule:
    # Runs on the 1st of every month at 08:00 UTC — well within the 60-day limit
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Update keepalive timestamp
        run: |
          echo "Last keepalive: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > .github/keepalive.txt

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: keepalive $(date -u '+%Y-%m')" && \
            git push
