name: Fetch NOAA Space Weather Data

on:
  # ── Automatic: every 10 minutes ──────────────────────────────────────────
  schedule:
    - cron: '*/10 * * * *'

  # ── Manual trigger from GitHub Actions UI ────────────────────────────────
  workflow_dispatch:

  # ── AUTO-BOOTSTRAP: run on first push to main ─────────────────────────────
  # This eliminates the human dependency — as soon as the workflow file
  # is committed to the repo, a first data fetch runs automatically.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fetch-noaa.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch NOAA endpoints
        run: |
          mkdir -p data

          echo "▶ Fetching NOAA data at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          # ── Current Kp ────────────────────────────────────────────────────
          # NOTE: geospace_pred_est_kp_1_hour.json appears frozen (NOAA issue).
          # Using noaa-planetary-k-index-forecast.json instead — it has current
          # observed + estimated Kp values with up-to-date timestamps.
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json" \
            -o /tmp/kp_raw.json || true
          python3 - << 'PY'
          import json
          try:
              with open('/tmp/kp_raw.json') as f:
                  d = json.load(f)
              # Forecast endpoint returns objects: {time_tag, kp, observed, noaa_scale}
              # Find the last observed/estimated entry (most recent real Kp)
              observed = [r for r in d if isinstance(r, dict) and r.get('observed') in ('observed','estimated')]
              last = observed[-1] if observed else d[-1]
              val  = float(last.get('kp', last.get('k', last.get('estimated_kp', 0))))
              time = last.get('time_tag', last.get('model_prediction_time', ''))
              out = {"kp": round(val, 2), "time": time, "source": "noaa-planetary-k-index-forecast"}
              with open('data/kp.json', 'w') as f:
                  json.dump(out, f)
              print(f"✓ kp.json: Kp {out['kp']} at {out['time']}")
          except Exception as e:
              print(f"✗ kp.json failed: {e}")
          PY

          # ── Kp history — planetary_k_index_1m (today's 1-min data) ───────
          # NOTE: This only covers today. Multi-day rolling history is a
          # planned improvement (append to a rolling JSON file).
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/json/planetary_k_index_1m.json" \
            -o /tmp/kp1m_raw.json || true
          python3 - << 'PY'
          import json
          try:
              with open('/tmp/kp1m_raw.json') as f:
                  d = json.load(f)
              out = []
              for r in d:
                  try:
                      if isinstance(r, dict):
                          # Current NOAA format: object with named keys
                          t = r.get('time_tag', '')
                          v = round(float(r.get('estimated_kp', r.get('kp_index', 0))), 2)
                      elif isinstance(r, list):
                          # Legacy array format: [time, kp, ...]
                          t = r[0]
                          v = round(float(r[1]), 2)
                      else:
                          continue
                      if t and v >= 0:
                          out.append({"time_tag": t, "kp": v})
                  except:
                      pass
              with open('data/kp_history.json', 'w') as f:
                  json.dump(out, f)
              print(f"✓ kp_history.json: {len(out)} rows")
          except Exception as e:
              print(f"✗ kp_history.json failed: {e}")
          PY

          # ── Kp 1-min latest — most recent single reading ──────────────────
          # Used as browser fallback when direct NOAA CORS fetch fails.
          # Has its own independent curl so it doesn't fail when kp_history is empty.
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/json/planetary_k_index_1m.json" \
            -o /tmp/kp1m_latest_raw.json || true
          python3 - << 'PY'
          import json
          try:
              with open('/tmp/kp1m_latest_raw.json') as f:
                  d = json.load(f)
              val, time = None, None
              for r in reversed(d):
                  try:
                      if isinstance(r, dict):
                          v = round(float(r.get('estimated_kp', r.get('kp_index', -1))), 2)
                          t = r.get('time_tag', '')
                      elif isinstance(r, list):
                          v = round(float(r[1]), 2)
                          t = r[0]
                      else:
                          continue
                      if t and v >= 0:
                          val, time = v, t
                          break
                  except:
                      pass
              if val is not None:
                  with open('data/kp_1m_latest.json', 'w') as f:
                      json.dump({"kp": val, "time": time, "source": "planetary_k_index_1m"}, f)
                  print(f"✓ kp_1m_latest.json: Kp {val} at {time}")
              else:
                  print("✗ kp_1m_latest.json: no valid row found")
          except Exception as e:
              print(f"✗ kp_1m_latest.json failed: {e}")
          PY

          # ── Kp forecast — noaa-planetary-k-index-forecast.json ───────────
          # CORS-blocked in browsers — fetched server-side here.
          # Format: [["time_tag","kp","observed/estimated"],[...], ...]
          # Row 0 is a header row.
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json" \
            -o /tmp/fc_raw.json || true
          python3 - << 'PY'
          import json
          try:
              with open('/tmp/fc_raw.json') as f:
                  d = json.load(f)
              out = []
              # NOAA changed format: now returns array of objects {time_tag, kp, observed, noaa_scale}
              # Old format was 2D array with header row — handle both for resilience.
              for r in d:
                  try:
                      if isinstance(r, dict):
                          # New format: object with named keys
                          time = r.get("time_tag", "")
                          val  = float(r.get("kp", 0))
                          obs  = r.get("observed", "")
                      elif isinstance(r, list) and len(r) >= 2 and r[0] != "time_tag":
                          # Old format: [time_tag, kp, observed]
                          time = r[0]
                          val  = float(r[1])
                          obs  = r[2] if len(r) > 2 else ""
                      else:
                          continue  # skip header rows
                      out.append({"time_tag": time, "kp": round(val, 2), "observed": obs})
                  except:
                      pass
              with open('data/kp_forecast.json', 'w') as f:
                  json.dump(out, f)
              print(f"✓ kp_forecast.json: {len(out)} rows")
          except Exception as e:
              print(f"✗ kp_forecast.json failed: {e}")
          PY

          # ── Solar wind plasma ─────────────────────────────────────────────
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/products/solar-wind/plasma-2-hour.json" \
            -o data/solar_wind_plasma.json || true
          [ -f data/solar_wind_plasma.json ] && echo "✓ solar_wind_plasma.json" || echo "✗ solar_wind_plasma.json failed"

          # ── Solar wind mag ────────────────────────────────────────────────
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/products/solar-wind/mag-2-hour.json" \
            -o data/solar_wind_mag.json || true
          [ -f data/solar_wind_mag.json ] && echo "✓ solar_wind_mag.json" || echo "✗ solar_wind_mag.json failed"

          # ── Alerts ────────────────────────────────────────────────────────
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/products/alerts.json" \
            -o data/alerts.json || true
          [ -f data/alerts.json ] && echo "✓ alerts.json" || echo "✗ alerts.json failed"

          # ── GOES X-ray (6-hour) ───────────────────────────────────────────
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/json/goes/primary/xrays-6-hour.json" \
            -o data/xrays_6h.json || true
          [ -f data/xrays_6h.json ] && echo "✓ xrays_6h.json" || echo "✗ xrays_6h.json failed"

          # ── Integral protons (6-hour) ─────────────────────────────────────
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/json/goes/primary/integral-protons-6-hour.json" \
            -o data/protons_6h.json || true
          [ -f data/protons_6h.json ] && echo "✓ protons_6h.json" || echo "✗ protons_6h.json failed"

          # ── Solar cycle predicted ─────────────────────────────────────────
          curl -sf --max-time 15 \
            "https://services.swpc.noaa.gov/json/solar-cycle/predicted-solar-cycle.json" \
            -o data/solar_cycle.json || true
          [ -f data/solar_cycle.json ] && echo "✓ solar_cycle.json" || echo "✗ solar_cycle.json failed"

          # ── Fetch timestamp ───────────────────────────────────────────────
          python3 -c "
          import json
          from datetime import datetime, timezone
          with open('data/meta.json','w') as f:
              json.dump({'fetched_utc': datetime.now(timezone.utc).isoformat(), 'source': 'NOAA SWPC'}, f)
          "
          echo "✓ meta.json written"

          echo ""
          echo "=== data/ contents ==="
          ls -lh data/

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet \
            && echo "No changes — NOAA data unchanged since last run" \
            || (git commit -m "chore: NOAA data update $(date -u '+%Y-%m-%dT%H:%M:%SZ')" && git push)
